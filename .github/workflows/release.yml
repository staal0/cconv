name: Release
on:
  push:
    tags:
      - 'v*'

# Needed to create the GitHub release and to commit the generated Homebrew
# formula back into this repository (the brew tap is this same repo).
permissions:
  contents: write

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history + tags for the changelog and version
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: false
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
